<div class="candidate-page">

  <div class="top-bar">

    <h1>Quản lý ứng viên</h1>

    <button (click)="showForm = true">
      + Thêm ứng viên
    </button>

  </div>

  <!-- FORM -->

  <div class="form-box" *ngIf="showForm">

    <input
      type="text"
      placeholder="Họ tên"
      [(ngModel)]="newCandidate.full_name"
    >

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="newCandidate.email"
    >

    <input
      type="text"
      placeholder="Số điện thoại"
      [(ngModel)]="newCandidate.phone"
    >

    <input
      type="text"
      placeholder="Vị trí ứng tuyển"
      [(ngModel)]="newCandidate.position"
    >

    <button (click)="addCandidate()">
      Lưu
    </button>

  </div>

  <!-- TABLE -->

  <table>

    <thead>

      <tr>

        <th>ID</th>
        <th>Họ tên</th>
        <th>Email</th>
        <th>SĐT</th>
        <th>Vị trí</th>
        <th>Trạng thái</th>
        <th>Hành động</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let item of candidates">

        <td>{{ item.id }}</td>

        <td>{{ item.full_name }}</td>

        <td>{{ item.email }}</td>

        <td>{{ item.phone }}</td>

        <td>{{ item.position }}</td>

        <td>

          <span class="status">
            {{ item.status }}
          </span>

        </td>

        <td>

          <button
            class="hire-btn"
            (click)="hireCandidate(item)"
          >
            Tuyển
          </button>

          <button
            class="reject-btn"
            (click)="rejectCandidate(item)"
          >
            Từ chối
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
