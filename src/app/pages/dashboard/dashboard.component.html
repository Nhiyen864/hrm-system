<h1 class="title">
  Dashboard
</h1>

<div class="cards">

  <div class="card">

    <h3>Tổng nhân viên</h3>

    <p>
      {{ dashboard.totalEmployees }}
    </p>

  </div>

  <div class="card">

    <h3>Đang làm việc</h3>

    <p>
      {{ dashboard.workingEmployees }}
    </p>

  </div>

  <div class="card">

    <h3>Phòng ban</h3>

    <p>
      {{ dashboard.totalDepartments }}
    </p>

  </div>

  <div class="card">

    <h3>Tuyển dụng mở</h3>

    <p>
      {{ dashboard.openRecruitments }}
    </p>

  </div>

  <div class="card">

    <h3>Đơn nghỉ phép</h3>

    <p>
      {{ dashboard.pendingLeaveRequests }}
    </p>

  </div>

  <div class="card">

    <h3>Ứng viên</h3>

    <p>
      {{ dashboard.totalCandidates }}
    </p>

  </div>

</div>
