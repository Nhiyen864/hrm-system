<div class="login-container">

  <div class="login-box">

    <h1>HRM SYSTEM</h1>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username"
    >

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    >

    <button (click)="login()">
      Đăng nhập
    </button>

  </div>

</div>
