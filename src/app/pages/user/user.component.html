<div class="users-page">

  <div class="top-bar">
    <h1>Quản lý người dùng</h1>
    <button (click)="showForm = true">+ Tạo tài khoản mới</button>
  </div>

  <!-- FORM TẠO USER -->
  <div class="form-box" *ngIf="showForm">
    <h2>Tạo tài khoản mới</h2>

    <div class="form-group">
      <label>Username <span class="required">*</span></label>
      <input type="text" [(ngModel)]="newUser.username" placeholder="Nhập username">
    </div>

    <div class="form-group">
      <label>Password <span class="required">*</span></label>
      <input type="password" [(ngModel)]="newUser.password" placeholder="Nhập password">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="newUser.email" placeholder="Nhập email">
    </div>

    <div class="form-group">
      <label>Vai trò</label>
      <select [(ngModel)]="newUser.role">
        <option value="HR">HR (Quản lý)</option>
        <option value="MANAGER">Manager</option>
        <option value="VIEWER">Viewer (Chỉ xem)</option>
      </select>
    </div>

    <div class="form-buttons">
      <button class="btn-cancel" (click)="resetForm()">Hủy</button>
      <button class="btn-save" (click)="createUser()">Tạo tài khoản</button>
    </div>
  </div>

  <!-- DANH SÁCH USER -->
  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Username</th>
        <th>Email</th>
        <th>Vai trò</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email || '—' }}</td>
        <td>
          <span class="role-badge" [ngClass]="user.role.toLowerCase()">
            {{ user.role }}
          </span>
        </td>
        <td>
          <span class="status-badge" [ngClass]="user.status.toLowerCase()">
            {{ user.status }}
          </span>
        </td>
        <td>
          <button class="btn-lock"
                  *ngIf="user.status === 'ACTIVE'"
                  (click)="lockUser(user.id)">
            Khóa
          </button>
          <button class="btn-unlock"
                  *ngIf="user.status === 'LOCKED'"
                  (click)="unlockUser(user.id)">
            Mở khóa
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
