<div class="performance-page">

  <div class="top-bar">

    <h1>Đánh giá nhân viên</h1>

    <button (click)="showForm = true">
      + Thêm đánh giá
    </button>

  </div>

  <!-- FORM -->

  <div
    class="form-box"
    *ngIf="showForm"
  >

    <input
      type="number"
      placeholder="Employee ID"
      [(ngModel)]="newPerformance.employeeId"
    >

    <input
      type="number"
      placeholder="Điểm"
      [(ngModel)]="newPerformance.score"
    >

    <input
      type="text"
      placeholder="Nhận xét"
      [(ngModel)]="newPerformance.review"
    >

    <input
      type="text"
      placeholder="Kỳ đánh giá"
      [(ngModel)]="newPerformance.period"
    >

    <button (click)="addPerformance()">
      Lưu
    </button>

  </div>

  <!-- TABLE -->

  <table>

    <thead>

      <tr>

        <th>ID</th>

        <th>Nhân viên</th>

        <th>Điểm</th>

        <th>Xếp loại</th>

        <th>Nhận xét</th>

        <th>Kỳ đánh giá</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let item of performances">

        <td>{{ item.id }}</td>

        <td>{{ item.employeeName }}</td>

        <td>{{ item.score }}</td>

        <td>

          <span class="rank">

            {{ getRank(item.score) }}

          </span>

        </td>

        <td>{{ item.review }}</td>

        <td>{{ item.period }}</td>

      </tr>

    </tbody>

  </table>

</div>
